name: SkynetMonitor

services:
  api:
    build:
      context: ./API_Skynet_Monitor
      dockerfile: Dockerfile
    container_name: SkynetMonitor_API
    env_file:
      - API_Skynet_Monitor/.env
    volumes:
      - skynet_models:/app/models
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - WebSite

volumes:
  skynet_models:

networks:
  WebSite:
    external: true
